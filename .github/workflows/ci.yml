name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # --- Backend CI ---
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm install

    - name: Prisma Generate
      working-directory: ./backend
      run: npx prisma generate --schema src/models/prisma/schema.prisma
      env:
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/test_db"

    - name: Build backend
      working-directory: ./backend
      run: npm run build

    - name: Prepare Test Database
      working-directory: ./backend
      run: |
        mkdir -p database
        npx prisma db push --schema src/models/prisma/schema.prisma --accept-data-loss
      env:
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/test_db"

    - name: Run backend tests
      working-directory: ./backend
      run: npm test -- --verbose
      env:
        NODE_ENV: test
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/test_db"
        TEST_DATABASE_URL: "postgresql://postgres:password@localhost:5432/test_db"

    # --- Frontend CI ---
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm install

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    - name: Run frontend tests
      working-directory: ./frontend
      run: npm test

    # --- E2E Tests ---
    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps
      
    - name: Run E2E tests
      working-directory: ./frontend
      run: npm run test:e2e