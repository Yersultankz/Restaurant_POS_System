name: Deploy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Build backend
        working-directory: backend
        run: npm ci && npm run build
